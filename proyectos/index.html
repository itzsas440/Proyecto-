<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lista de Pendientes</title>
</head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<body class="bg-light">

    <div class="container mt-5" style="max-width: 500px;">
        <div class="card p-4 shadow-sm">
            <h2 class="mb-4">Lista de Pendientes</h2>
            <div class="input-group mb-3">
                <input type="text" id="input-box" class="form-control" placeholder="Escribe una tarea...">
                <button class="btn btn-primary" onclick="agregar()">Agregar</button>
            </div>

            <h3>Pendientes</h3>
            <ul id="pendientes" class="list-group mb-3"></ul>
            <button class="btn btn-primary btn-sm" onclick="mover()">Marcar como completado</button>

            <h3 class="mt-4">Realizadas</h3>
            <ul id="realizadas" class="list-group mb-3"></ul>
            <button class="btn btn-danger btn-sm" onclick="remover()">Borrar tareas realizadas</button>
        </div>
    </div>
    <script src="pendiente.js"></script>
</body>

</html>
